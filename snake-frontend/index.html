<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Snake</title>
    <!-- Google Analytics placeholder. Replace 'G-YOUR_MEASUREMENT_ID' with your actual Google Analytics Measurement ID -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6PJ06K3RXM"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-6PJ06K3RXM');
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="../index.html" class="home-btn">&#8592; Arcade Hub</a>
    
    <div class="header">
        <h1 class="title">ZEN SNAKE</h1>
        <div class="score-container">
            <div class="score-box">
                <span class="score-label">Score</span>
                <span id="score">0</span>
            </div>
            <div class="score-box">
                <span class="score-label">High Score</span>
                <span id="highScore">0</span>
            </div>
        </div>
    </div>

    <div class="game-wrapper">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="overlay" class="overlay">
            <div class="overlay-content">
                <h2 id="overlayTitle">Zen Snake</h2>
                <p id="overlayMessage">Press any key to start</p>
                <button id="startBtn" class="btn primary">Start Game</button>
            </div>
        </div>
    </div>

    <div class="controls-info">
        <p>Use arrow keys or WASD to navigate</p>
    </div>

    <div class="mobile-controls">
        <div class="control-row">
            <button class="control-btn" id="upBtn">▲</button>
        </div>
        <div class="control-row">
            <button class="control-btn" id="leftBtn">◀</button>
            <button class="control-btn" id="downBtn">▼</button>
            <button class="control-btn" id="rightBtn">▶</button>
        </div>
    </div>

    <script src="script.js?v=4"></script>
</body>
</html>
