<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Pipes - Connect the Flow | Arcade Hub</title>
    <meta name="description" content="Connect the glowing pipes before time runs out! Rotate pieces to build the perfect neon flow in this challenging puzzle game.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5174002360692771" crossorigin="anonymous"></script>
</head>
<body>
    <header class="hud">
        <div class="hud-left">
            <a href="../index.html" class="hud-btn" id="hub-btn">🏠</a>
        </div>
        <div class="hud-center">
            <div class="stat-item">
                <span class="stat-label">Score</span>
                <span class="stat-value" id="score">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Level</span>
                <span class="stat-value" id="level">1</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Time</span>
                <span class="stat-value" id="timer">60</span>
            </div>
        </div>
        <div class="hud-right">
            <button class="hud-btn" id="mute-btn">🔊</button>
            <button class="hud-btn" id="pause-btn">⏸</button>
        </div>
    </header>

    <main class="game-container">
        <div class="pipe-grid" id="pipe-grid">
            <div class="node source-node"></div>
            <div class="node dest-node"></div>
            <!-- Cells will be generated by JS -->
        </div>
    </main>

    <!-- Start Screen -->
    <div class="overlay active" id="start-screen">
        <div class="modal">
            <h2>NEON PIPES</h2>
            <p>Rotate pieces to connect the flow from green to yellow before time runs out!</p>
            <button class="btn-main" id="start-btn">Start Game</button>
            <button class="btn-outline" id="htp-btn">How to Play</button>
        </div>
    </div>

    <!-- Pause Screen -->
    <div class="overlay" id="pause-screen">
        <div class="modal">
            <h2>PAUSED</h2>
            <button class="btn-main" id="resume-btn">Resume</button>
            <button class="btn-outline" id="restart-btn">Restart Level</button>
            <a href="../index.html" class="btn-outline" style="display: block; text-decoration: none; margin-top: 10px;">Exit to Hub</a>
        </div>
    </div>

    <!-- Level Complete Screen -->
    <div class="overlay" id="complete-screen">
        <div class="modal">
            <h2 style="color: var(--neon-green);">EXCELLENT!</h2>
            <div id="level-summary" style="margin-bottom: 20px;">
                <p>Level Score: <span id="summary-score" style="color: var(--neon-cyan);">1000</span></p>
                <p>Time Bonus: <span id="summary-bonus" style="color: var(--neon-pink);">250</span></p>
            </div>
            <button class="btn-main" id="next-btn">Next Level</button>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div class="overlay" id="over-screen">
        <div class="modal">
            <h2 style="color: var(--neon-pink);">TIME'S UP!</h2>
            <p>Your journey ends here. Retry the level?</p>
            <button class="btn-main" id="retry-btn">Retry Level</button>
            <a href="../index.html" class="btn-outline" style="display: block; text-decoration: none; margin-top: 10px;">Back to Hub</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
