<body>
    <div class="header">
        <a href="../index.html" class="home-btn">← Home</a>
        <h1 class="game-title">Neon Bottle Shooter</h1>
    </div>

    <!-- Main Game Wrapper -->
    <div class="game-wrapper" id="gameWrapper">
        <canvas id="gameCanvas"></canvas>
        
        <!-- UI Overlays -->
        <div id="hud" class="overlay hud-hidden">
            <div class="top-bar">
                <div class="score-container">SCORE: <span id="ui-score">0</span></div>
                <div class="time-container" id="ui-time">60</div>
                <div class="accuracy-container">ACC: <span id="ui-accuracy">100%</span></div>
            </div>
            <div class="combo-container" id="ui-combo-container">
                <span id="ui-combo-text">COMBO x1</span>
            </div>
            <div class="bottom-bar">
                <div class="ammo-container" id="ui-ammo">🔫 6 / 6</div>
                <button id="btn-reload" class="action-btn reload-btn">RELOAD</button>
                <button id="btn-pause" class="action-btn pause-btn">||</button>
            </div>
        </div>

        <!-- Menus -->
        <div id="mainMenu" class="menu-overlay">
            <h2>Select Mode</h2>
            <div class="mode-buttons">
                <button class="mode-btn" data-mode="classic">
                    <h3>Classic Mode</h3>
                    <p>60 seconds. Highest score wins.</p>
                </button>
                <button class="mode-btn" data-mode="survival">
                    <h3>Survival Mode</h3>
                    <p>3 strikes and you're out. Increasing difficulty.</p>
                </button>
                <button class="mode-btn" data-mode="precision">
                    <h3>Precision Mode</h3>
                    <p>Limited bullets. Make every shot count.</p>
                </button>
            </div>
        </div>

        <div id="gameOverMenu" class="menu-overlay hidden">
            <h2 id="go-title">Game Over</h2>
            <div class="stats-panel">
                <p>Score: <span id="go-score">0</span></p>
                <p>Best: <span id="go-best">0</span></p>
                <p>Accuracy: <span id="go-accuracy">0%</span></p>
                <p>Max Combo: <span id="go-combo">0</span></p>
                <p>Bottles: <span id="go-bottles">0</span></p>
            </div>
            <button id="btn-restart" class="play-btn">Play Again</button>
            <button id="btn-menu" class="secondary-btn">Main Menu</button>
        </div>
        
        <div id="pauseMenu" class="menu-overlay hidden">
            <h2>Paused</h2>
            <button id="btn-resume" class="play-btn">Resume</button>
            <button id="btn-quit" class="secondary-btn">Quit to Menu</button>
                <!-- Adsterra Mobile Banner (320x50) -->

        </div>
    </div>
