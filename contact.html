    <style>
        .nav-header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 0 1rem;
        }
        .back-link {
            text-decoration: none;
            color: var(--primary);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.3s ease;
        }
        .back-link:hover {
            transform: translateX(-5px);
        }
    </style><!-- Dark Mode Ad Formatting -->
    <style>
        .ad-container { background-color: transparent !important; }
        .ad-container iframe { background-color: transparent !important; color-scheme: dark !important; }
    </style>
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5174002360692771"
     crossorigin="anonymous"></script>
</head>
<body>
    <!-- Hamburger Menu Button -->
    <button id="menu-toggle" class="menu-toggle-btn" aria-label="Toggle Menu">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <!-- Sidebar Navigation Drawer -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>
    <nav id="sidebar" class="sidebar-nav">
        <button id="menu-close" class="menu-close-btn" aria-label="Close Menu">✕</button>
        <div class="sidebar-header">
            <h2>Arcade Hub</h2>
            <div class="sidebar-divider"></div>
        </div>
        <div class="sidebar-links">
            <a href="/" class="sidebar-link">🏠 Arcade Hub</a>
            <a href="retro-hub" class="sidebar-link">🕹️ Retro Hub</a>
            <a href="achievements" class="sidebar-link">🏆 Trophy Room</a>
            <a href="about" class="sidebar-link">ℹ️ About Us</a>
            <a href="contact" class="sidebar-link active-hub">✉️ Contact Us</a>
        </div>
    </nav>

    <main class="container">
        <div class="contact-container">
            <div class="contact-header">
                <h1>Contact Us</h1>
                <p>Have a game idea, found a bug, or just want to say hi? We'd love to hear from you!</p>
            </div>

            <!-- Formspree Integration -->
            <form action="https://formspree.io/f/mvzwyoev" method="POST">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" placeholder="Subject">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="Your Message" required></textarea>
                </div>
                <button type="submit" class="submit-btn" id="sendBtn">Send Message</button>
            </form>
        </div>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Arcade Hub. All rights reserved. | <a href="privacy">Privacy Policy</a> | <a href="tos">Terms of Service</a> | <a href="contact">Contact Us</a> | <a href="updates">News</a></p>
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Sidebar Drawer Toggle Logic
            const menuToggle = document.getElementById('menu-toggle');
            const menuClose = document.getElementById('menu-close');
            const sidebar = document.getElementById('sidebar');
            const sidebarOverlay = document.getElementById('sidebar-overlay');

            if (menuToggle && menuClose && sidebar && sidebarOverlay) {
                const toggleSidebar = () => {
                    sidebar.classList.toggle('active');
                    sidebarOverlay.classList.toggle('active');
                    document.body.classList.toggle('menu-open');
                };

                menuToggle.addEventListener('click', toggleSidebar);
                menuClose.addEventListener('click', toggleSidebar);
                sidebarOverlay.addEventListener('click', toggleSidebar);
            }
        });
    </script>
    <!-- PWA Service Worker & Install Prompt Registration -->
    <script src="shared/pwa-setup.js"></script>
</body>
</html>
