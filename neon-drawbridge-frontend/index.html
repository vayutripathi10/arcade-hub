</head>
<body>

<!-- ── Level Select Screen ───────────────────── -->
<div id="screenMenu" class="screen active">
    <a href="../index.html" class="home-btn">&larr; Arcade Hub</a>
    <h1 class="game-title">NEON DRAW<br><span>BRIDGE</span></h1>
    <p class="subtitle">Draw bridges. Defy gravity. Reach the portal.</p>
    <div id="levelGrid" class="level-grid"></div>
    <p class="tip">💡 Draw lines with mouse or finger, then press Play to launch the ball!</p>
</div>

<!-- ── Game Screen ───────────────────────────── -->
<div id="screenGame" class="screen">
    <div class="game-hud">
        <a href="../index.html" class="home-btn-small">&larr;</a>
        <span id="levelName" class="level-name">Level 1</span>
        <div class="ink-container">
            <span class="ink-label">INK</span>
            <div class="ink-bar-bg">
                <div id="inkBar" class="ink-bar"></div>
            </div>
        </div>
    </div>

    <div class="canvas-wrapper">
        <canvas id="gameCanvas"></canvas>
        <button id="pauseBtn" class="pause-btn hidden">
            <span class="pause-icon">||</span>
        </button>
    </div>

    <!-- Pause Menu -->
    <div id="pauseMenu" class="overlay hidden">
        <div class="overlay-box">
            <h2>Paused</h2>
            <button id="btn-resume" class="btn primary" style="margin-bottom: 10px;">Resume</button>
            <button id="btn-quit" class="btn secondary">Quit to Menu</button>
                <!-- Adsterra Mobile Banner (320x50) -->
                <div class="ad-container mobile-banner" style="margin-top: 15px; display: flex; justify-content: center; width: 100%; overflow: hidden;">
                    <script>
                    atOptions = {
                        'key' : '68ced95a589a3c37a8f41a8fff267340',
                        'format' : 'iframe',
                        'height' : 50,
                        'width' : 320,
                        'params' : {}
                    };
                    </script>
                    <script src="https://www.highperformanceformat.com/68ced95a589a3c37a8f41a8fff267340/invoke.js"></script>
                </div>

        </div>
    </div>

    <div class="controls-bar">
        <button id="btnDraw" class="ctrl-btn active" title="Draw Mode">✏️ Draw</button>
        <button id="btnPlay" class="ctrl-btn" title="Launch Ball (Space)">▶ Play</button>
        <button id="btnUndo" class="ctrl-btn" title="Undo last line">↩ Undo</button>
        <button id="btnRestart" class="ctrl-btn" title="Restart level (R)">🔄 Reset</button>
        <button id="btnHint" class="ctrl-btn hint-btn" title="Show hint">💡</button>
    </div>

    <!-- Dead Overlay -->
    <div id="overlayDead" class="overlay hidden">
        <div class="overlay-box">
            <div class="overlay-icon">💥</div>
            <h2>Oops!</h2>
            <p>The ball didn't make it...</p>
            <button id="btnRetry" class="btn primary">Try Again</button>
            <button id="btnMenuFromDead" class="btn secondary">Level Select</button>
        </div>
    </div>

    <!-- Win Overlay -->
    <div id="overlayWin" class="overlay hidden">
        <div class="overlay-box win-box">
            <div class="overlay-icon">🎉</div>
            <h2>Level Complete!</h2>
            <div id="winStars" class="win-stars"></div>
            <div class="win-stats">
                <span id="winTime"></span>
                <span id="winInk"></span>
            </div>
            <button id="btnNext" class="btn primary">Next Level ▶</button>
            <button id="btnMenuFromWin" class="btn secondary">Level Select</button>
        </div>
    </div>

    <!-- Hint Overlay -->
    <div id="overlayHint" class="overlay hint-overlay hidden">
        <div class="hint-box">
            <p id="hintText"></p>
            <button id="btnCloseHint" class="btn secondary">Got it!</button>
        </div>
    </div>
</div>

<script src="../shared/audio-fx.js"></script>
<script src="script.js"></script>
</body>
</html>
