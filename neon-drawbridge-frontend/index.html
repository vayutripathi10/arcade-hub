    <!-- Ultimate Network Ad Blocker Shield -->
    <script>
    (function() {
        const protectSelectors = 'a, button, canvas, .game-card, .btn, .pause-btn, .share-btn, .home-btn, .nav-link, .cell, input, select, .score-container';
        
        // 1. Intercept all global event bindings (how Popunders usually hijack)
        const originalAdd = EventTarget.prototype.addEventListener;
        EventTarget.prototype.addEventListener = function(type, listener, options) {
            if ((this === window || this === document || this === document.body) && 
                ['click', 'mousedown', 'touchstart', 'mouseup', 'touchend'].includes(type) &&
                typeof listener === 'function') 
            {
                const wrappedListener = function(e) {
                    if (e.target && e.target.closest && e.target.closest(protectSelectors)) {
                        return; // Shield activated! Block the ad from receiving this interaction.
                    }
                    return listener.apply(this, arguments);
                };
                return originalAdd.call(this, type, wrappedListener, options);
            }
            return originalAdd.call(this, type, listener, options);
        };

        // 2. Prevent dynamic overlay hijacking (invisible divs)
        const observer = new MutationObserver(mutations => {
            mutations.forEach(mut => {
                mut.addedNodes.forEach(node => {
                    if (node.tagName === 'DIV' && node.style) {
                        // Check if it's acting like a full-screen overlay clickjacker
                        const isAbsolute = node.style.position === 'absolute' || node.style.position === 'fixed';
                        const isMassive = parseInt(node.style.zIndex || 0) > 1000;
                        if (isAbsolute && isMassive && !node.classList.contains('ad-container')) {
                            // Automatically push behind our UI
                            node.style.zIndex = '1';
                            node.style.pointerEvents = 'none'; // Click through to game!
                        }
                    }
                });
            });
        });
        document.addEventListener('DOMContentLoaded', () => {
            observer.observe(document.body, { childList: true, subtree: true });
        });
    })();
    </script>

<body>

<!-- ── Level Select Screen ───────────────────── -->
<div id="screenMenu" class="screen active">
    <div class="header">
        <a href="../index.html" class="home-btn">&#8592; Arcade Hub</a>
    </div>
    <h1 class="game-title">NEON DRAW<br><span>BRIDGE</span></h1>
    <p class="subtitle">Draw bridges. Defy gravity. Reach the portal.</p>
    <div id="levelGrid" class="level-grid"></div>
    <p class="tip">💡 Draw lines with mouse or finger, then press Play to launch the ball!</p>
</div>

<!-- ── Game Screen ───────────────────────────── -->
<div id="screenGame" class="screen">
    <div class="game-hud">
        <a href="../index.html" class="home-btn-small">&larr;</a>
        <span id="levelName" class="level-name">Level 1</span>
        <div class="ink-container">
            <span class="ink-label">INK</span>
            <div class="ink-bar-bg">
                <div id="inkBar" class="ink-bar"></div>
            </div>
        </div>
    </div>

    <div class="canvas-wrapper">
        <canvas id="gameCanvas"></canvas>
        <button id="pauseBtn" class="pause-btn hidden">
            <span class="pause-icon">||</span>
        </button>
    </div>

    <!-- Pause Menu -->
    <div id="pauseMenu" class="overlay hidden">
        <div class="overlay-box">
            <h2>Paused</h2>
            <button id="btn-resume" class="btn primary" style="margin-bottom: 10px;">Resume</button>
            <button id="btn-quit" class="btn secondary">Quit to Menu</button>

        </div>
    </div>

    <div class="controls-bar">
        <button id="btnDraw" class="ctrl-btn active" title="Draw Mode">✏️ Draw</button>
        <button id="btnPlay" class="ctrl-btn" title="Launch Ball (Space)">▶ Play</button>
        <button id="btnUndo" class="ctrl-btn" title="Undo last line">↩ Undo</button>
        <button id="btnRestart" class="ctrl-btn" title="Restart level (R)">🔄 Reset</button>
        <button id="btnHint" class="ctrl-btn hint-btn" title="Show hint">💡</button>
    </div>

    <!-- Dead Overlay -->
    <div id="overlayDead" class="overlay hidden">
        <div class="overlay-box">
            <div class="overlay-icon">💥</div>
            <h2>Oops!</h2>
            <p>The ball didn't make it...</p>
            <button id="btnRetry" class="btn primary">Try Again</button>
            <button id="btnMenuFromDead" class="btn secondary">Level Select</button>
        </div>
    </div>

    <!-- Win Overlay -->
    <div id="overlayWin" class="overlay hidden">
        <div class="overlay-box win-box">
            <div class="overlay-icon">🎉</div>
            <h2>Level Complete!</h2>
            <div id="winStars" class="win-stars"></div>
            <div class="win-stats">
                <span id="winTime"></span>
                <span id="winInk"></span>
            </div>
            <button id="btnNext" class="btn primary">Next Level ▶</button>
            <button id="btnMenuFromWin" class="btn secondary">Level Select</button>
        </div>
    </div>

    <!-- Hint Overlay -->
    <div id="overlayHint" class="overlay hint-overlay hidden">
        <div class="hint-box">
            <p id="hintText"></p>
            <button id="btnCloseHint" class="btn secondary">Got it!</button>
        </div>
    </div>
</div>

<script src="../shared/audio-fx.js"></script>
<script src="script.js?v=ArcadeHub_GlobalUI"></script>
<script>
    const wakeUpAudio = () => {
        if (window.audioFX && typeof window.audioFX.init === 'function') {
            window.audioFX.init();
        }
    };
    window.addEventListener('click', wakeUpAudio, { once: true });
    window.addEventListener('touchstart', wakeUpAudio, { once: true });
</script>
