<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Games Hub</title>
    <!-- Reusing structure from hub-style but overriding colors for a classic look -->
    <link rel="stylesheet" href="hub-style.css">
    <style>
        body {
            background-color: #e0e0e0;
            color: #222;
            background-image: linear-gradient(#d0d0d0 1px, transparent 1px), linear-gradient(90deg, #d0d0d0 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Courier New', Courier, monospace;
        }
        .header {
            background-color: #cc0000;
            border-bottom: 4px solid #fff;
            box-shadow: 0 4px 0 #888;
        }
        .header h1 {
            color: #fff;
            text-shadow: 2px 2px 0 #000;
            letter-spacing: 2px;
        }
        .nav-links a {
            color: #fff;
            text-shadow: 1px 1px 0 #000;
            font-weight: bold;
        }
        .nav-links a:hover {
            color: #ffd700;
            text-shadow: 1px 1px 0 #000;
        }
        .main-content {
            padding-top: 120px;
        }
        .game-grid {
            gap: 30px;
        }
        .game-card {
            background: #fff;
            border: 4px solid #cc0000;
            box-shadow: 6px 6px 0 #888;
            border-radius: 0;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .game-card:hover {
            transform: translate(2px, 2px);
            box-shadow: 4px 4px 0 #888;
            border-color: #ff0000;
        }
        .game-card .thumb-placeholder {
            background: #ddd;
            color: #888;
            border-bottom: 4px solid #cc0000;
            font-size: 40px;
        }
        .game-card h2 {
            color: #cc0000;
            font-weight: bold;
            text-transform: uppercase;
        }
        .game-card p {
            color: #444;
            font-size: 14px;
        }
        .play-btn {
            background: #cc0000;
            border: 2px solid #000;
            border-radius: 0;
            box-shadow: 2px 2px 0 #000;
        }
        .play-btn:hover {
            background: #ff0000;
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0 #000;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>🕹️ Retro Games</h1>
        <nav class="nav-links">
            <a href="index.html">⚡ Neon Hub</a>
            <a href="retro-hub.html" style="color:#ffd700;">🕹️ Retro Hub</a>
        </nav>
    </header>

    <main class="main-content">
        <div class="game-grid">
            <div class="game-card">
                <div class="thumb-placeholder">🏎️</div>
                <h2>Retro Racer</h2>
                <p>Classic top-down driving. Dodge the blue traffic cars and hit the yellow fuel trucks to extend your time!</p>
                <div class="tags">
                    <span class="tag">Racing</span>
                    <span class="tag">Classic</span>
                </div>
                <a href="retro-racer-frontend/index.html" class="play-btn">INSERT COIN</a>
            </div>
            
            <!-- Future games can go here -->
            <div class="game-card" style="opacity: 0.6; pointer-events: none;">
                <div class="thumb-placeholder">?</div>
                <h2>Coming Soon</h2>
                <p>More classic graphic games will be added to the Retro Hub in the future.</p>
                <a href="#" class="play-btn" style="background:#555;">LOCKED</a>
            </div>
        </div>
    </main>
</body>
</html>
