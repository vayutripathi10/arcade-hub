<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, follow">
    <title>404 - Page Not Found | Arcade Hub</title>
    <!-- Google Analytics placeholder. -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-B8XQ759LPH"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-B8XQ759LPH');
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/hub-style.css">
    <style>
        .error-container {
            text-align: center;
            max-width: 600px;
            margin: 10rem auto 4rem;
            padding: 3rem;
            background: var(--card-bg);
            border-radius: 30px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }
        .error-title {
            font-size: 5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-light));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }
        .error-message {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }
        .back-home {
            display: inline-block;
            padding: 1rem 2rem;
            border-radius: 12px;
            background: var(--primary);
            color: #000;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
        }
        .back-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.4);
        }
    </style>

    <!-- Ultimate Anti-Popunder Script to Protect Game Feel -->
    <script>
    (function() {
        const stopAd = function(e) { e.stopPropagation(); };
        function protectUI() {
            const selectors = 'a, button, canvas, .game-card, .btn, .pause-btn, .share-btn, .home-btn, .nav-link, .cell, input, select';
            document.querySelectorAll(selectors).forEach(el => {
                if (!el.dataset.protected) {
                    el.dataset.protected = 'true';
                    ['mousedown', 'touchstart', 'touchend', 'click'].forEach(evt => {
                        el.addEventListener(evt, stopAd, { passive: false });
                    });
                }
            });
        }
        document.addEventListener('DOMContentLoaded', () => {
            protectUI();
            new MutationObserver(protectUI).observe(document.body, { childList: true, subtree: true });
        });
    })();
    </script>

    <!-- Dark Mode Ad Formatting -->
    <style>
        .ad-container { background-color: transparent !important; }
        .ad-container iframe { background-color: transparent !important; color-scheme: dark !important; }
    </style>
</head>
<body>
    <div class="header-container" style="margin-bottom: 0;">
        <h1 class="main-title">Arcade Hub</h1>
    </div>

    <main class="container">
        <div class="error-container">
            <h1 class="error-title">404</h1>
            <p class="error-message">Oops! The page you're looking for doesn't exist or has been moved.</p>
            <a href="/index.html" class="back-home">Return to Home</a>
        </div>
    </main>
</body>
</html>
