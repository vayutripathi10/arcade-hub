<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Trophy Room - View your game achievements and badges across the Arcade Hub. Track your progress in Zen Dino, Zen Snake, and more.">
    <title>Achievements | Arcade Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="hub-style.css">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-B8XQ759LPH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-B8XQ759LPH');
    </script>
    <style>
        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 2rem;
        }
        .achievement-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .achievement-card.locked {
            filter: grayscale(1) opacity(0.5);
        }
        .achievement-card.unlocked {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.1);
        }
        .achievement-card.unlocked::after {
            content: 'UNLOCKED';
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 10px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 1px;
        }
        .badge-icon {
            font-size: 40px;
            background: rgba(255, 255, 255, 0.05);
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        .unlocked .badge-icon {
            border-color: var(--primary);
            background: rgba(0, 255, 204, 0.05);
            text-shadow: 0 0 10px var(--primary);
        }
        .badge-info h3 {
            margin: 0;
            font-size: 1.1rem;
            color: var(--text-primary);
        }
        .badge-info p {
            margin: 5px 0 0;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .game-tag {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary);
            opacity: 0.7;
            margin-bottom: 4px;
            display: block;
        }
        .back-nav {
            margin-bottom: 2rem;
        }
        .stats-summary {
            background: rgba(0, 255, 204, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-around;
            border: 1px solid rgba(0, 255, 204, 0.1);
        }
        .stat-box {
            text-align: center;
        }
        .stat-box .value {
            display: block;
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }
        .stat-box .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="header-container">
        <div class="back-nav">
            <a href="index.html" class="nav-link">← Back to Hub</a>
        </div>
        <h1 class="main-title">Trophy Room</h1>
        <p class="subtitle">Your achievements across the Arcade Hub</p>
    </div>

    <main class="container">
        <div class="stats-summary" id="stats-summary">
            <div class="stat-box">
                <span class="value" id="unlocked-count">0</span>
                <span class="label">Unlocked</span>
            </div>
            <div class="stat-box">
                <span class="value" id="total-count">0</span>
                <span class="label">Total</span>
            </div>
            <div class="stat-box">
                <span class="value" id="percent-complete">0%</span>
                <span class="label">Complete</span>
            </div>
        </div>

        <div class="achievements-grid" id="achievements-grid">
            <!-- Achievements will be populated by JS -->
        </div>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Arcade Hub. All rights reserved. | <a href="privacy.html">Privacy Policy</a> | <a href="contact.html">Contact Us</a> | <a href="updates.html">News</a></p>
    </footer>

    <script src="shared/achievements.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('achievements-grid');
            const data = window.achievements.getAllWithStatus();
            
            const unlockedCount = data.filter(a => a.unlocked).length;
            document.getElementById('unlocked-count').textContent = unlockedCount;
            document.getElementById('total-count').textContent = data.length;
            document.getElementById('percent-complete').textContent = Math.round((unlockedCount / data.length) * 100) + '%';

            data.forEach(achievement => {
                const card = document.createElement('div');
                card.className = `achievement-card ${achievement.unlocked ? 'unlocked' : 'locked'}`;
                card.innerHTML = `
                    <div class="badge-icon">${achievement.icon}</div>
                    <div class="badge-info">
                        <span class="game-tag">${achievement.game}</span>
                        <h3>${achievement.title}</h3>
                        <p>${achievement.desc}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        });
    </script>
</body>
</html>
