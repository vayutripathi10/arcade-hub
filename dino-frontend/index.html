<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="../favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Dino</title>
    <!-- Google Analytics placeholder. Replace 'G-YOUR_MEASUREMENT_ID' with your actual Google Analytics Measurement ID -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6PJ06K3RXM"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-6PJ06K3RXM');
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="../index.html" class="home-btn">&#8592; Arcade Hub</a>
    
    <div class="header">
        <h1 class="title">ZEN DINO</h1>
        <div class="score-container">
            <div class="score-box">
                <span class="score-label">Score</span>
                <span id="score">0</span>
            </div>
            <div class="score-box">
                <span class="score-label">High Score</span>
                <span id="highScore">0</span>
            </div>
        </div>
    </div>

    <div class="game-wrapper">
        <canvas id="gameCanvas" width="800" height="300"></canvas>
        <div id="overlay" class="overlay">
            <div class="overlay-content">
                <h2 id="overlayTitle">Zen Dino</h2>
                <p id="overlayMessage">Press Space or Tap to jump.<br>Press again while in air to <b>Double Jump</b>!</p>
                <div class="share-container hidden" id="shareContainer">
                    <button class="btn share-btn twitter" id="tweetBtn">Share on X</button>
                    <button class="btn share-btn whatsapp" id="waBtn">WhatsApp</button>
                </div>
                <button id="startBtn" class="btn primary">Start Game</button>
            </div>
        </div>
    </div>

    <div class="controls-info">
        <p>Press <b>SPACE</b> or <b>Tap/Click</b> to jump. (Supports <b>Double Jump</b>)</p>
    </div>

    <script src="../shared/audio-fx.js"></script>
    <script src="../shared/achievements.js"></script>
    <script src="script.js?v=6"></script>
</body>
</html>
