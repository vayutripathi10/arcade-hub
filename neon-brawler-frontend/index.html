<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="../favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Neon Brawler</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-B8XQ759LPH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-B8XQ759LPH');
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <a href="../index.html" class="home-btn">&#8592; Arcade Hub</a>
        <div class="score-container">
            <div class="score-box">
                <span class="score-label">Streak</span>
                <span id="score">0</span>
            </div>
            <div class="score-box">
                <span class="score-label">Best</span>
                <span id="highScore">0</span>
            </div>
        </div>
    </div>

    <div class="game-wrapper">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <div id="leftTouchZone" class="touch-zone left"></div>
        <div id="rightTouchZone" class="touch-zone right"></div>

        <div id="overlay" class="overlay">
            <div class="overlay-content">
                <h2 id="overlayTitle">Neon Brawler</h2>
                <p id="overlayMessage">Enemies approach from both sides.<br>Tap Left/Right or use Arrow Keys to strike!</p>
                <div class="share-container hidden" id="shareContainer">
                    <button class="btn share-btn twitter" id="tweetBtn">Share on X</button>
                    <button class="btn share-btn whatsapp" id="waBtn">WhatsApp</button>
                </div>
                <button id="startBtn" class="btn primary">Start Fighting</button>
            </div>
        </div>
    </div>

    <script src="../shared/audio-fx.js"></script>
    <script src="../shared/achievements.js"></script>
    <script src="script.js"></script>
</body>
</html>
